sources:
  # All sources use a unified score threshold of 7.

  - id: openai_blog
    name: "OpenAI Blog"
    tier: 1
    method: rss
    url: "https://openai.com/news/rss.xml"
    max_articles: 50
    score_threshold: 7

  - id: deepmind_blog
    name: "Google DeepMind"
    tier: 1
    method: scrape
    url: "https://deepmind.google/blog/"
    url_must_contain: "/blog/"
    score_threshold: 7

  - id: anthropic_news
    name: "Anthropic"
    tier: 1
    method: rss_with_fallback
    url: "https://www.anthropic.com/rss.xml"
    fallback_url: "https://www.anthropic.com/news"
    url_must_contain: "/news/"
    article_selector: "article.postCard, div[class*='featuredGrid'] a[href]"
    date_selector: ".date"
    score_threshold: 7

  - id: techcrunch_ai
    name: "TechCrunch AI"
    tier: 2
    method: scrape
    url: "https://techcrunch.com/category/artificial-intelligence/"
    article_selector: "li.wp-block-post"
    date_selector: "time"
    max_articles: 37
    score_threshold: 7

  - id: mckinsey_insights
    name: "McKinsey QuantumBlack Insights"
    tier: 2
    method: firecrawl
    url: "https://www.mckinsey.com/capabilities/quantumblack/our-insights"
    url_must_contain: "/quantumblack/our-insights/"
    score_threshold: 7

  - id: venturebeat_ai
    name: "VentureBeat AI"
    tier: 2
    method: firecrawl
    url: "https://venturebeat.com/category/ai/"
    url_must_contain: "venturebeat.com/"
    score_threshold: 7

  - id: tldr_ai
    name: "TLDR AI"
    tier: 2
    method: date_range
    base_url: "https://tldr.tech/ai/"
    story_selector: "article.mt-3"
    headline_selector: "a.font-bold h3"
    link_selector: "a.font-bold"
    summary_selector: "div.newsletter-html"
    skip_sections: ["aisponsor"]
    score_threshold: 7

settings:
  freshness_days: 7
  max_articles_per_source: 20
  cache_file: "cache/seen_articles.json"

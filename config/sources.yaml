sources:
  # All sources use a unified score threshold of 7.
  # Non-AI articles (e.g. from TLDR Tech) are filtered by the scoring prompt before this threshold applies.

  - id: openai_blog
    name: "OpenAI Blog"
    tier: 1
    method: rss
    url: "https://openai.com/news/rss.xml"
    score_threshold: 7

  - id: deepmind_blog
    name: "Google DeepMind"
    tier: 1
    method: scrape
    url: "https://deepmind.google/blog/"
    url_must_contain: "/blog/"
    score_threshold: 7

  - id: anthropic_news
    name: "Anthropic"
    tier: 1
    method: rss_with_fallback
    url: "https://www.anthropic.com/rss.xml"
    fallback_url: "https://www.anthropic.com/news"
    url_must_contain: "/news/"
    score_threshold: 7

  - id: microsoft_ai
    name: "Microsoft AI Blog"
    tier: 1
    method: rss_with_fallback
    url: "https://blogs.microsoft.com/ai/feed/"
    fallback_url: "https://www.microsoft.com/en-us/ai/blog/"
    score_threshold: 7

  - id: techcrunch_ai
    name: "TechCrunch AI"
    tier: 2
    method: rss
    url: "https://techcrunch.com/category/artificial-intelligence/feed/"
    score_threshold: 7

  - id: mckinsey_ai
    name: "McKinsey Insights"
    tier: 2
    method: rss
    url: "https://www.mckinsey.com/insights/rss"
    score_threshold: 7

  - id: tldr_ai
    name: "TLDR Tech"
    tier: 2
    method: rss
    url: "https://tldr.tech/rss"
    score_threshold: 7

settings:
  freshness_days: 7
  max_articles_per_source: 20
  cache_file: "cache/seen_articles.json"
